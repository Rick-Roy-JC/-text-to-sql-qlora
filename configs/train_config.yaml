# Central config for src/train.py — same file drives both the ablation runs
# and the final full-budget run; only `regime` and `lora.r` change between runs.

model:
  base_model: "microsoft/Phi-3-mini-4k-instruct"   # swap to meta-llama/Llama-3.2-3B-Instruct to compare
  max_seq_length: 3584   # covers Phase 2 audit max of 3,395 tokens (with-schema, train split) with margin

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16                # overridden per ablation run: 8, 16, 32
  alpha: 32             # fixed across all ablation + final runs
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  dataset: "spider"
  train_file: "data/spider/train_spider.json"
  tables_file: "data/spider/tables.json"
  databases_dir: "data/spider/database"
  dev_file: "data/spider/dev.json"          # held-out eval only — never used for training/selection
  val_fraction: 0.10                         # carved from train_spider.json
  prompt_variant: "with_schema"              # or "no_schema" — see src/prompts.py

# Two distinct training budgets — documented explicitly so ablation numbers
# and final headline numbers are never confused for the same regime.
regime:
  name: "ablation"        # "ablation" | "final"
  ablation:
    train_subset_size: 2500
    epochs: 2
  final:
    train_subset_size: null   # null = use full carved train split (~6300 examples)
    epochs: 3

training:
  # batch=1 chosen deliberately at max_seq_length=3584 — T4 16GB risk at longer
  # sequences is per-sample activation memory, not just base-model size. Keeps
  # effective batch size at 16 via grad accumulation instead of larger micro-batches.
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  optim: "paged_adamw_8bit"
  logging_steps: 10
  save_steps: 50
  gradient_checkpointing: true
  bf16: true
  seed: 42

output:
  adapter_dir: "adapters"
  checkpoint_dir: "checkpoints"
